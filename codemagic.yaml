workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: LeMarq # Replace with the name you gave your API key in Codemagic UI
    environment:
      groups:
        - app_store_credentials 
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
        FLUTTER_FLAVOR: "prod"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain to be used for codesigning using Codemagic CLI 'keychain' command
        script: |
          keychain initialize
      - name: Fetch signing files
        script: |
          if [ "$RUN_FETCH_SIGNING_FILES" = "true" ] && [ -n "$CERTIFICATE_PRIVATE_KEY" ]; then
            echo "RUN_FETCH_SIGNING_FILES=true and CERTIFICATE_PRIVATE_KEY is set. Fetching signing files from App Store Connect."
            app-store-connect fetch-signing-files "de.lemarq.stimmapp" --type IOS_APP_STORE --certificate-key=@env:CERTIFICATE_PRIVATE_KEY --create
          else
            echo "Skipping fetch-signing-files. Using certificates/profiles provided in Codemagic UI (.p12 + provisioning profile)."
          fi
      - name: Set up signing certificate
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages get
      - name: Install CocoaPods dependencies
        script: |
          find . -name "Podfile" -exec dir {} \;
          cd ios && pod install
      - name: Flutter build ipa
        script: |
          flutter build ipa --release --flavor $FLUTTER_FLAVOR --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration 
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
