workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: LeMarq # Replace with the name you gave your API key in Codemagic UI
    environment:
      groups:
        - app_store_credentials 
      ios_signing:
        distribution_type: app_store
        bundle_identifier: de.lemarq.stimmapp
      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain to be used for codesigning using Codemagic CLI 'keychain' command
        script: |
          keychain initialize
      - name: Set up signing certificate
        script: |
          keychain add-certificates
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          flutter packages get
      - name: Install CocoaPods dependencies
        script: |
          if [ -f "ios/Podfile" ]; then
            cd ios
            echo "Using Podfile from: $(pwd)/Podfile"
            head -n 20 Podfile || true
            if ! grep -q "platform :ios" Podfile; then
              echo "No iOS platform specified in Podfile. Inserting iOS 16.0."
              cp Podfile Podfile.bak
              {
                echo "platform :ios, '16.0'"
                cat Podfile.bak
              } > Podfile
            fi
            sed -i.bak "s/platform :ios, '13.0'/platform :ios, '16.0'/g" Podfile
            sed -i.bak "s/platform :ios, '15.0'/platform :ios, '16.0'/g" Podfile
            rm -f Podfile.bak
            pod install
          else
            echo "No ios/Podfile found. Skipping pod install."
          fi
      - name: Flutter build ipa
        script: |
          flutter build ipa --release --build-number=$BUILD_NUMBER --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration 
        submit_to_testflight: true
        beta_groups:
          - "Internal Testers"
  ios-preview:
    name: iOS Preview (Simulator)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          flutter packages get
      - name: Install CocoaPods dependencies
        script: |
          if [ -f "ios/Podfile" ]; then
            cd ios
            rm -rf Pods Podfile.lock
            pod install --repo-update
          else
            echo "No ios/Podfile found. Skipping pod install."
          fi
      - name: Build iOS Simulator app
        script: |
          flutter build ios --simulator --debug --no-pub
    artifacts:
      - build/ios/iphonesimulator/*.app
